
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobres – Sistema Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#e0f2fe,#f8fafc);
margin:0;
padding:20px;
max-width:750px;
margin:auto;
color:#0f172a;
}

.banner{
width:100%;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.15);
margin-bottom:25px;
}

.countdown{
background:#1e3a8a;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
font-weight:600;
}

.escassez{
background:linear-gradient(135deg,#ef4444,#f87171);
color:white;
padding:14px;
border-radius:14px;
font-weight:700;
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:15px;
border-radius:14px;
border:none;
background:#f1f5f9;
box-shadow:inset 3px 3px 8px rgba(0,0,0,0.08);
}

.pagamento{
display:flex;
gap:12px;
margin-bottom:15px;
}

.botao{
flex:1;
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
font-weight:700;
color:white;
box-shadow:0 8px 0 rgba(0,0,0,0.25);
}

.pix{background:#16a34a;}
.cartao{background:#2563eb;}

.total{
font-size:26px;
font-weight:800;
color:#1d4ed8;
margin-top:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-top:15px;
font-weight:700;
cursor:pointer;
color:white;
box-shadow:0 8px 0 rgba(0,0,0,0.3);
}

.pix-btn{background:#059669;}
.whats-btn{background:#16a34a;}

.admin-btn{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:14px;
color:#94a3b8;
cursor:pointer;
opacity:0.6;
}

.admin-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.admin-content{
background:white;
padding:25px;
border-radius:20px;
width:95%;
max-width:600px;
max-height:90vh;
overflow:auto;
}

</style>
</head>

<body>

<img src="https://i.postimg.cc/s2fgXprp/Blue_and_White_Turkey_Travel_Photo_Collage_Instagram_Post_20260212_074545_0000.png" class="banner">

<div class="card">

<div class="countdown" id="contador"></div>

<div class="escassez">
🔥 Restam <span id="vagas"></span> vagas disponíveis
</div>

<label>Nome completo</label>
<input type="text" id="nome">

<label>Tipo</label>
<select id="tipo">
<option value="">Selecione</option>
<option value="adulto">Adulto</option>
<option value="crianca">Criança</option>
<option value="casal">Casal</option>
</select>

<div class="pagamento">
<div class="botao pix" onclick="forma='pix';calcular()">PIX</div>
<div class="botao cartao" onclick="forma='cartao';calcular()">Cartão</div>
</div>

<div class="total">
Total: R$ <span id="valorTotal">0,00</span>
</div>

<button class="pix-btn" onclick="copiarPix()">Copiar chave PIX</button>
<button class="whats-btn" onclick="confirmar()">Confirmar pagamento</button>

</div>

<!-- BOTÃO ADMIN -->
<div class="admin-btn" onclick="abrirAdmin()">⚙︎</div>

<!-- MODAL ADMIN -->
<div class="admin-modal" id="adminModal">
<div class="admin-content">

<h3>Painel Administrativo</h3>

<p><b>Total arrecadado:</b> R$ <span id="totalArrecadado">0</span></p>

<label>Transporte</label>
<input type="number" id="cTransporte">

<label>Hospedagem</label>
<input type="number" id="cHospedagem">

<label>Alimentação</label>
<input type="number" id="cAlimentacao">

<label>Outros</label>
<input type="number" id="cOutros">

<button onclick="calcularLucro()" style="background:#2563eb;">Calcular lucro</button>

<p><b>Lucro:</b> R$ <span id="lucro">0</span></p>

<h4>Reservas:</h4>
<ul id="lista"></ul>

<button onclick="fecharAdmin()" style="background:#ef4444;">Fechar</button>

</div>
</div>

<script>

let valores={
adulto:{pix:870,cartao:899},
crianca:{pix:780,cartao:799},
casal:{pix:1800,cartao:1849}
};

let forma="";
let vagas=localStorage.getItem("vagas")||25;
let reservas=JSON.parse(localStorage.getItem("reservas"))||[];

document.getElementById("vagas").innerText=vagas;

function calcular(){
let tipo=document.getElementById("tipo").value;
if(!tipo||!forma)return;
let valor=valores[tipo][forma];
document.getElementById("valorTotal").innerText=
valor.toLocaleString("pt-BR",{minimumFractionDigits:2});
}

function copiarPix(){
alert("Após pagar, envie o comprovante no WhatsApp.");
navigator.clipboard.writeText("trilheiros.roomt@gmail.com");
}

function confirmar(){
if(vagas<=0){alert("Esgotado");return;}

let nome=document.getElementById("nome").value.trim().toLowerCase();
let tipo=document.getElementById("tipo").value;

if(!nome||!tipo||!forma){alert("Preencha tudo.");return;}
if(reservas.find(r=>r.nome===nome)){alert("Nome já cadastrado.");return;}

let valor=valores[tipo][forma];

reservas.push({nome,valor});
localStorage.setItem("reservas",JSON.stringify(reservas));

vagas--;
localStorage.setItem("vagas",vagas);
document.getElementById("vagas").innerText=vagas;

window.open("https://wa.me/5566996926174","_blank");

atualizarAdmin();
}

function abrirAdmin(){
if(prompt("Senha:")!=="2026")return;
document.getElementById("adminModal").style.display="flex";
atualizarAdmin();
}

function fecharAdmin(){
document.getElementById("adminModal").style.display="none";
}

function atualizarAdmin(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;

reservas.forEach((r,i)=>{
total+=r.valor;
lista.innerHTML+=`<li>${r.nome} - R$ ${r.valor}
<button onclick="excluir(${i})">Excluir</button></li>`;
});

document.getElementById("totalArrecadado").innerText=total;
}

function excluir(i){
reservas.splice(i,1);
localStorage.setItem("reservas",JSON.stringify(reservas));
vagas++;
localStorage.setItem("vagas",vagas);
document.getElementById("vagas").innerText=vagas;
atualizarAdmin();
}

function calcularLucro(){
let total=parseFloat(document.getElementById("totalArrecadado").innerText)||0;
let custos=(+cTransporte.value||0)+(+cHospedagem.value||0)+(+cAlimentacao.value||0)+(+cOutros.value||0);
document.getElementById("lucro").innerText=(total-custos);
}

/* CONTADOR REGRESSIVO */
let dataEvento=new Date("2026-04-11T05:00:00");
setInterval(()=>{
let agora=new Date();
let diff=dataEvento-agora;
if(diff<=0){
document.getElementById("contador").innerText="Inscrições encerradas";
return;
}
let dias=Math.floor(diff/(1000*60*60*24));
let horas=Math.floor((diff/(1000*60*60))%24);
let minutos=Math.floor((diff/1000/60)%60);
document.getElementById("contador").innerText=
"⏳ Encerramento em: "+dias+"d "+horas+"h "+minutos+"m";
},1000);

</script>

</body>
</html>
