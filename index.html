<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Passeio Nobres - Trilheiros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
margin:0;
padding:20px;
max-width:800px;
margin:auto;
}

.banner{
width:100%;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.card{
background:#111827;
padding:25px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

h1{
font-size:24px;
font-weight:800;
margin-bottom:10px;
}

.section{
margin-top:15px;
font-weight:600;
color:#38bdf8;
}

label{
display:block;
margin-top:12px;
font-weight:600;
}

select,input{
width:100%;
padding:12px;
margin-top:5px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

.total{
font-size:26px;
font-weight:800;
margin-top:15px;
color:#38bdf8;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
font-weight:700;
cursor:pointer;
}

.pix{
background:#059669;
color:white;
}

.cartao{
background:#2563eb;
color:white;
}

.whats{
background:#16a34a;
color:white;
}

.alerta{
margin-top:8px;
color:#f87171;
font-weight:600;
}

</style>
</head>

<body>

<img class="banner" src="https://i.postimg.cc/s2fgXprp/Blue_and_White_Turkey_Travel_Photo_Collage_Instagram_Post_20260212_074545_0000.png">

<div class="card">

<h1>💙 Nobres te chama!</h1>

📅 11 e 12 de abril  
⏰ Saída 05h  
🕑 Retorno 14h  

<div class="section">Roteiro</div>
Rio Triste<br>
Balneário Refúgio

<div class="section">Incluso</div>

Transporte ida e volta<br>
Almoço<br>
Café da manhã<br>
Hospedagem<br>
Seguro de vida

<div class="section">Valores</div>

Adulto PIX 870 | Cartão 899<br>
Criança PIX 780 | Cartão 799<br>
Casal PIX 1800 | Cartão 1849

</div>


<div class="card">

<label>Nome completo</label>
<input id="nome">

<label>Adultos</label>
<select id="adultos"></select>

<label>Crianças</label>
<select id="criancas"></select>

<label>Casal</label>
<select id="casal"></select>

<label>Forma de pagamento</label>

<select id="pagamento">

<option value="">Escolher</option>
<option value="pix">PIX</option>
<option value="cartao">Cartão</option>

</select>

<div class="total">
Total: R$ <span id="total">0</span>
</div>

<div id="aviso" class="alerta"></div>

<button id="pixBtn" class="pix" style="display:none">
Copiar chave PIX
</button>

<button id="cartaoBtn" class="cartao" style="display:none">
Pagar no Cartão
</button>

<button class="whats" onclick="whats()">
Confirmar reserva no WhatsApp
</button>

</div>

<script>

let valores={

adulto:{pix:870,cartao:899},
crianca:{pix:780,cartao:799},
casal:{pix:1800,cartao:1849}

}

for(let i=0;i<=10;i++){

adultos.innerHTML+=`<option>${i}</option>`
criancas.innerHTML+=`<option>${i}</option>`
casal.innerHTML+=`<option>${i}</option>`

}

adultos.onchange=calcular
criancas.onchange=calcular
casal.onchange=calcular
pagamento.onchange=calcular

function calcular(){

let a=adultos.value
let c=criancas.value
let cs=casal.value
let p=pagamento.value

let total=0

if(p){

total+=a*valores.adulto[p]
total+=c*valores.crianca[p]
total+=cs*valores.casal[p]

}

totalSpan=total.toLocaleString("pt-BR")

document.getElementById("total").innerText=totalSpan

document.getElementById("pixBtn").style.display="none"
document.getElementById("cartaoBtn").style.display="none"

if(p==="pix"){

pixBtn.style.display="block"

}

if(p==="cartao"){

cartaoBtn.style.display="block"

}

}

pixBtn.onclick=function(){

navigator.clipboard.writeText("trilheiros.roomt@gmail.com")

alert("PIX copiado. Após pagar envie o comprovante no WhatsApp.")

}

cartaoBtn.onclick=function(){

let cs=casal.value
let a=adultos.value

if(cs>0){

window.open("https://mpago.li/1btjQWB")

return

}

if(a>0){

window.open("https://mpago.li/2HtFaSv")

return

}

alert("Escolha quantidade primeiro")

}

function whats(){

let nome=document.getElementById("nome").value

window.open("https://wa.me/5566996926174?text=Olá quero confirmar minha vaga para Nobres. Nome: "+nome)

}

</script>

</body>
</html>
