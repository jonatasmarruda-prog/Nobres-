<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobres Premium</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:#f1f5f9;
margin:0;
padding:15px;
max-width:700px;
margin:auto;
color:#0f172a;
}

.banner{
width:100%;
border-radius:16px;
margin-bottom:20px;
object-fit:contain;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.vagas{
background:#fee2e2;
color:#b91c1c;
padding:10px;
border-radius:12px;
font-weight:600;
text-align:center;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #d1d5db;
font-size:15px;
}

.pagamento{
display:flex;
gap:12px;
margin-bottom:15px;
}

.botao{
flex:1;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
font-weight:600;
font-size:16px;
box-shadow:0 5px 0 rgba(0,0,0,0.15);
}

.pix{background:#16a34a;color:white;}
.cartao{background:#2563eb;color:white;}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.whats-btn{background:#22c55e;color:white;}
.pix-btn{background:#10b981;color:white;}

.admin{
display:none;
background:#ffffff;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
margin-top:30px;
}

.admin h3{
margin-top:0;
}

.small-link{
text-align:center;
font-size:12px;
color:#94a3b8;
margin-top:40px;
cursor:pointer;
}
</style>
</head>

<body>

<img src="https://i.postimg.cc/s2fgXprp/Blue_and_White_Turkey_Travel_Photo_Collage_Instagram_Post_20260212_074545_0000.png" class="banner">

<div class="card">

<div class="vagas">
Vagas disponíveis: <span id="vagas"></span>
</div>

<label>Nome completo</label>
<input type="text" id="nome">

<label>Tipo</label>
<select id="tipo">
<option value="">Selecione</option>
<option value="adulto">Adulto</option>
<option value="crianca">Criança</option>
<option value="casal">Casal</option>
</select>

<div class="pagamento">
<div class="botao pix" onclick="forma='pix'">PIX</div>
<div class="botao cartao" onclick="forma='cartao'">Cartão</div>
</div>

<button class="pix-btn" onclick="copiarPix()">Copiar chave PIX</button>
<button class="whats-btn" onclick="confirmar()">Enviar comprovante</button>

</div>

<div class="admin" id="adminPanel">
<h3>Painel Administrativo</h3>

<p><b>Total arrecadado:</b> R$ <span id="totalArrecadado">0</span></p>

<label>Custo Transporte</label>
<input type="number" id="cTransporte">

<label>Custo Hospedagem</label>
<input type="number" id="cHospedagem">

<label>Outros custos</label>
<input type="number" id="cOutros">

<button onclick="calcularLucro()">Calcular lucro</button>

<p><b>Lucro estimado:</b> R$ <span id="lucro">0</span></p>

<h4>Reservas:</h4>
<ul id="listaReservas"></ul>

<button onclick="resetar()">Resetar vagas</button>

</div>

<div class="small-link" onclick="abrirAdmin()">Área interna</div>

<script>

let valores={
adulto:{pix:870,cartao:899},
crianca:{pix:780,cartao:799},
casal:{pix:1800,cartao:1849}
};

let forma="";
let vagas=localStorage.getItem("vagasNobres")||25;
let reservas=JSON.parse(localStorage.getItem("reservasNobres"))||[];

document.getElementById("vagas").innerText=vagas;

function copiarPix(){
navigator.clipboard.writeText("trilheiros.roomt@gmail.com")
.then(()=>alert("Chave PIX copiada!"));
}

function confirmar(){
if(vagas<=0){alert("Esgotado");return;}

let nome=document.getElementById("nome").value.trim().toLowerCase();
let tipo=document.getElementById("tipo").value;

if(!nome||!tipo||!forma){
alert("Preencha todos os campos.");
return;
}

if(reservas.find(r=>r.nome===nome)){
alert("Nome já registrado.");
return;
}

let valor=valores[tipo][forma];

reservas.push({nome,tipo,forma,valor});
localStorage.setItem("reservasNobres",JSON.stringify(reservas));

vagas--;
localStorage.setItem("vagasNobres",vagas);
document.getElementById("vagas").innerText=vagas;

atualizarAdmin();

window.open("https://wa.me/5566996926174","_blank");
}

function abrirAdmin(){
if(prompt("Senha:")!=="trilheiros2025"){return;}
document.getElementById("adminPanel").style.display="block";
atualizarAdmin();
}

function atualizarAdmin(){
let lista=document.getElementById("listaReservas");
lista.innerHTML="";
let total=0;

reservas.forEach((r,i)=>{
total+=r.valor;
let li=document.createElement("li");
li.innerHTML=r.nome+" - R$ "+r.valor+
" <button onclick='excluir("+i+")'>Excluir</button>";
lista.appendChild(li);
});

document.getElementById("totalArrecadado").innerText=total;
}

function excluir(i){
vagas++;
localStorage.setItem("vagasNobres",vagas);
reservas.splice(i,1);
localStorage.setItem("reservasNobres",JSON.stringify(reservas));
document.getElementById("vagas").innerText=vagas;
atualizarAdmin();
}

function calcularLucro(){
let total=parseFloat(document.getElementById("totalArrecadado").innerText)||0;
let custos=(+document.getElementById("cTransporte").value||0)+
(+document.getElementById("cHospedagem").value||0)+
(+document.getElementById("cOutros").value||0);

document.getElementById("lucro").innerText=(total-custos);
}

function resetar(){
localStorage.setItem("vagasNobres",25);
localStorage.removeItem("reservasNobres");
location.reload();
}

</script>

</body>
</html>
